# Netlify configuration — static site, no build step
[build]
  publish = "."
  command = ""

# Security & caching headers
# Filenames are not content-hashed, so always revalidate (ETag) instead of
# caching "immutable" — this guarantees visitors get the latest CSS/JS/images.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=0, must-revalidate"
